# This is a Databricks asset bundle definition for sephora_recommender.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: sephora_recommender
  uuid: e4ff0aab-32e0-4d97-9d4e-a96fbb5422ca

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-7df30eb0-0464.cloud.databricks.com
    variables:
      catalog: dbacademy
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-7df30eb0-0464.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/ryean3@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ryean3@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dbacademy
      schema: prod
    permissions:
      - user_name: ryean3@gmail.com
        level: CAN_MANAGE
